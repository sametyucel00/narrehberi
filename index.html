  <script>
    (() => {
      const STORAGE_KEY = 'nar_accessibility_preferences_v1';
      const defaultState = { contrast: false, largeFont: false, dyslexicFont: false, reducedMotion: false, speechActive: false };
      const safeParse = (value) => { try { return value ? JSON.parse(value) : null; } catch { return null; } };
      const state = Object.assign({}, defaultState, safeParse(localStorage.getItem(STORAGE_KEY)) || {});
      const doc = document.documentElement;
      const speech = window.speechSynthesis || null;
      let panel; let launcher; let liveRegion;
      const persist = () => { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); };
      const announce = (message) => { if (liveRegion) liveRegion.textContent = message; };
      const stopSpeech = () => { if (speech && speech.speaking) { speech.cancel(); } state.speechActive = false; syncUI(); };
      const getReadableText = () => {
        const selection = window.getSelection ? String(window.getSelection()).trim() : '';
        if (selection) return selection;
        const root = document.querySelector('main, [role="main"], #root');
        const source = root || document.body;
        return (source.innerText || '').replace(/\s+/g, ' ').replace(/Eri\u015filebilirlik ara\u00e7lar\u0131/g, '').trim().slice(0, 2400);
      };
      const startSpeech = () => {
        if (!speech) { announce('Bu cihazda sesli okuma desteklenmiyor.'); return; }
        const text = getReadableText();
        if (!text) { announce('Okunacak metin bulunamad\u0131.'); return; }
        speech.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'tr-TR'; utterance.rate = 0.95; utterance.pitch = 1;
        utterance.onend = () => { state.speechActive = false; syncUI(); announce('Sesli okuma tamamland\u0131.'); };
        utterance.onerror = () => { state.speechActive = false; syncUI(); announce('Sesli okuma ba\u015flat\u0131lamad\u0131.'); };
        state.speechActive = true; syncUI(); speech.speak(utterance); announce('Sesli okuma ba\u015flat\u0131ld\u0131.');
      };
      const toggleSpeech = () => { if (state.speechActive) { stopSpeech(); announce('Sesli okuma durduruldu.'); } else { startSpeech(); } };
      const applyState = () => { doc.dataset.a11yContrast = state.contrast ? 'high' : 'normal'; doc.dataset.a11yFont = state.largeFont ? 'large' : 'normal'; doc.dataset.a11yDyslexic = state.dyslexicFont ? 'true' : 'false'; doc.dataset.a11yReducedMotion = state.reducedMotion ? 'true' : 'false'; persist(); };
      const syncUI = () => {
        applyState(); if (!panel) return;
        panel.querySelector('[data-action="contrast"]')?.classList.toggle('is-active', state.contrast);
        panel.querySelector('[data-action="font"]')?.classList.toggle('is-active', state.largeFont);
        panel.querySelector('[data-action="dyslexic"]')?.classList.toggle('is-active', state.dyslexicFont);
        panel.querySelector('[data-action="motion"]')?.classList.toggle('is-active', state.reducedMotion);
        panel.querySelector('[data-action="speech"]')?.classList.toggle('is-active', state.speechActive);
        const speechLabel = panel.querySelector('[data-speech-label]'); if (speechLabel) speechLabel.textContent = state.speechActive ? 'Durdur' : 'Sesli Okuma';
      };
      const togglePanel = (force) => {
        if (!panel) return; const shouldOpen = typeof force === 'boolean' ? force : panel.hidden; panel.hidden = !shouldOpen; launcher.setAttribute('aria-expanded', String(shouldOpen)); if (shouldOpen) { panel.querySelector('button')?.focus(); } else { launcher.focus(); }
      };
      const buildButton = ({ action, icon, title, detail, onClick }) => {
        const button = document.createElement('button'); button.type = 'button'; button.className = action === 'speech' ? 'nar-a11y-read' : 'nar-a11y-action'; button.dataset.action = action;
        button.innerHTML = action === 'speech' ? '<span>' + icon + ' <span data-speech-label>Sesli Okuma</span></span>' : '<span>' + icon + ' ' + title + '<small>' + detail + '</small></span><span aria-hidden="true">&#9673;</span>';
        button.addEventListener('click', onClick); return button;
      };
      const init = () => {
        liveRegion = document.createElement('div'); liveRegion.className = 'nar-a11y-live'; liveRegion.setAttribute('aria-live', 'polite'); document.body.appendChild(liveRegion);
        launcher = document.createElement('button'); launcher.type = 'button'; launcher.className = 'nar-a11y-launcher'; launcher.setAttribute('aria-label', 'Eri\u015filebilirlik ara\u00e7lar\u0131n\u0131 a\u00e7'); launcher.setAttribute('aria-expanded', 'false'); launcher.innerHTML = '<span aria-hidden="true">&#9855;</span><span>Eri\u015filebilirlik</span>'; launcher.addEventListener('click', () => togglePanel());
        panel = document.createElement('section'); panel.className = 'nar-a11y-panel'; panel.hidden = true; panel.setAttribute('role', 'dialog'); panel.setAttribute('aria-label', 'Eri\u015filebilirlik ara\u00e7lar\u0131');
        const head = document.createElement('div'); head.className = 'nar-a11y-head'; head.innerHTML = '<div><h2 class="nar-a11y-title">Eri\u015filebilirlik Ara\u00e7lar\u0131</h2><p class="nar-a11y-subtitle">Web ve mobil g\u00f6r\u00fcn\u00fcm i\u00e7in h\u0131zl\u0131 eri\u015fim ayarlar\u0131</p></div>';
        const close = document.createElement('button'); close.type = 'button'; close.className = 'nar-a11y-close'; close.setAttribute('aria-label', 'Paneli kapat'); close.textContent = '\u2715'; close.addEventListener('click', () => togglePanel(false)); head.appendChild(close); panel.appendChild(head);
        panel.appendChild(buildButton({ action: 'speech', icon: '&#128266;', onClick: toggleSpeech }));
        const grid = document.createElement('div'); grid.className = 'nar-a11y-grid';
        grid.appendChild(buildButton({ action: 'contrast', icon: '&#9681;', title: 'Y\u00fcksek Kontrast', detail: 'Renk fark\u0131n\u0131 g\u00fc\u00e7lendirir', onClick: () => { state.contrast = !state.contrast; syncUI(); announce(state.contrast ? 'Y\u00fcksek kontrast a\u00e7\u0131ld\u0131.' : 'Y\u00fcksek kontrast kapat\u0131ld\u0131.'); } }));
        grid.appendChild(buildButton({ action: 'font', icon: 'A+', title: 'B\u00fcy\u00fck Yaz\u0131', detail: 'Metinleri b\u00fcy\u00fct\u00fcr', onClick: () => { state.largeFont = !state.largeFont; syncUI(); announce(state.largeFont ? 'B\u00fcy\u00fck yaz\u0131 a\u00e7\u0131ld\u0131.' : 'B\u00fcy\u00fck yaz\u0131 kapat\u0131ld\u0131.'); } }));
        grid.appendChild(buildButton({ action: 'dyslexic', icon: 'Aa', title: 'Disleksi Dostu Font', detail: 'Okumay\u0131 kolayla\u015ft\u0131ran yaz\u0131 tipi', onClick: () => { state.dyslexicFont = !state.dyslexicFont; syncUI(); announce(state.dyslexicFont ? 'Disleksi dostu yaz\u0131 tipi a\u00e7\u0131ld\u0131.' : 'Disleksi dostu yaz\u0131 tipi kapat\u0131ld\u0131.'); } }));
        grid.appendChild(buildButton({ action: 'motion', icon: '&#9208;', title: 'Daha Az Hareket', detail: 'Animasyonlar\u0131 azalt\u0131r', onClick: () => { state.reducedMotion = !state.reducedMotion; syncUI(); announce(state.reducedMotion ? 'Daha az hareket modu a\u00e7\u0131ld\u0131.' : 'Daha az hareket modu kapat\u0131ld\u0131.'); } }));
        grid.appendChild(buildButton({ action: 'reset', icon: '&#8634;', title: 'S\u0131f\u0131rla', detail: 'T\u00fcm ayarlar\u0131 varsay\u0131lana d\u00f6nd\u00fcr\u00fcr', onClick: () => { stopSpeech(); Object.assign(state, defaultState); syncUI(); announce('Eri\u015filebilirlik ayarlar\u0131 s\u0131f\u0131rland\u0131.'); } }));
        panel.appendChild(grid);
        const footer = document.createElement('div'); footer.className = 'nar-a11y-footer'; footer.textContent = 'Sesli okumada \u00f6nce se\u00e7ili metin, se\u00e7im yoksa g\u00f6r\u00fcnen sayfa i\u00e7eri\u011fi okunur.'; panel.appendChild(footer);
        document.body.appendChild(panel); document.body.appendChild(launcher);
        document.addEventListener('keydown', (event) => { if (event.key === 'Escape' && panel && !panel.hidden) { togglePanel(false); } });
        document.addEventListener('click', (event) => { if (!panel || panel.hidden) return; const target = event.target; if (!(target instanceof Node)) return; if (!panel.contains(target) && !launcher.contains(target)) { togglePanel(false); } });
        if (speech) { window.addEventListener('beforeunload', stopSpeech); }
        syncUI();
      };
      applyState();
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init, { once: true }); } else { init(); }
    })();
  </script>
