name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - "ios/**"
      - "public/**"
      - "src/**"
      - "SRC/**"
      - "index.html"
      - "index.js"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - "public/**"
      - "src/**"
      - "SRC/**"
      - "index.html"
      - "index.js"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - ".github/workflows/ios-build.yml"

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/App/App/GoogleService-Info.plist
          elif [ -f "ios/App/App/GoogleService-Info.plist.template" ]; then
            cp ios/App/App/GoogleService-Info.plist.template ios/App/App/GoogleService-Info.plist
            echo "Template plist was used."
          else
            echo "GoogleService-Info.plist or template was not found."
            exit 1
          fi

      - name: Add iOS platform if missing
        run: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods if Podfile exists
        run: |
          cd ios/App
          if [ -f "Podfile" ]; then
            pod install --repo-update
          else
            echo "Podfile not found, CocoaPods step skipped."
          fi

      - name: Build iOS simulator app
        run: |
          if [ -d "ios/App/App.xcworkspace" ]; then
            XCODE_CONTAINER="-workspace ios/App/App.xcworkspace"
          else
            XCODE_CONTAINER="-project ios/App/App.xcodeproj"
          fi
          xcodebuild $XCODE_CONTAINER \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: |
            ios/build
            ios/App/App.xcodeproj
            ios/App/App.xcworkspace
          if-no-files-found: error