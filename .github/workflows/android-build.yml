name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - "android/**"
      - "public/**"
      - "src/**"
      - "SRC/**"
      - "index.html"
      - "index.js"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "android/**"
      - "public/**"
      - "src/**"
      - "SRC/**"
      - "index.html"
      - "index.js"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.json"
      - ".github/workflows/android-build.yml"

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Prepare Android google-services.json
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
            echo "google-services.json hazırlandı."
          else
            echo "ANDROID_GOOGLE_SERVICES_JSON_BASE64 yok, bu adım atlandı."
          fi

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/narrehberi.jks
            echo "Keystore hazırlandı."
          else
            echo "ANDROID_KEYSTORE_BASE64 yok, unsigned build alınacak."
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Release APK
        env:
          ANDROID_KEYSTORE_PATH: narrehberi.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew --no-daemon assembleRelease

      - name: Build Release AAB
        env:
          ANDROID_KEYSTORE_PATH: narrehberi.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew --no-daemon bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
