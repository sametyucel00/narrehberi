name: iOS Release

on:
  workflow_dispatch:

jobs:
  release-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install GoogleService-Info.plist from secret
        if: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 != '' }}
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          echo -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/App/App/GoogleService-Info.plist

      - name: Add iOS platform if missing
        run: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install signing assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Install CocoaPods if Podfile exists
        run: |
          cd ios/App
          if [ -f "Podfile" ]; then
            pod install --repo-update
          else
            echo "Podfile yok, CocoaPods adımı atlanıyor."
          fi

      - name: Build archive
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          if [ -d "ios/App/App.xcworkspace" ]; then
            XCODE_CONTAINER="-workspace ios/App/App.xcworkspace"
          else
            XCODE_CONTAINER="-project ios/App/App.xcodeproj"
          fi
          xcodebuild $XCODE_CONTAINER \
            -scheme App \
            -configuration Release \
            -archivePath ios/build/NarRehberi.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            -allowProvisioningUpdates \
            archive

      - name: Export IPA
        run: |
          mkdir -p ios/build/export
          xcodebuild -exportArchive \
            -archivePath ios/build/NarRehberi.xcarchive \
            -exportOptionsPlist .github/ios/ExportOptions-AppStore.plist \
            -exportPath ios/build/export

      - name: Upload to TestFlight
        if: ${{ secrets.APPSTORE_CONNECT_KEY_ID != '' && secrets.APPSTORE_CONNECT_ISSUER_ID != '' && secrets.APPSTORE_CONNECT_API_KEY_BASE64 != '' }}
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/private_keys"
          echo -n "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8"
          IPA_PATH=$(find ios/build/export -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "IPA not found"
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: |
            ios/build/NarRehberi.xcarchive
            ios/build/export
          if-no-files-found: error
